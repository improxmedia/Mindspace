<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Saving from Watch...</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .box {
      padding: 30px;
    }
    .check {
      font-size: 60px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="check" id="icon">⏳</div>
    <h2 id="status">Saving...</h2>
    <p id="msg"></p>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDi4JP6H1EQ-ym9nPrbbNeNlKgCXVfspC8",
      authDomain: "improx-lead-gen.firebaseapp.com",
      projectId: "improx-lead-gen",
      storageBucket: "improx-lead-gen.firebasestorage.app",
      messagingSenderId: "803338655121",
      appId: "1:803338655121:web:5dc754d9e1b12cbaa03630"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const USER_ID = "xJpj4mAYLDYHOZy5g3JQ4uAzvH82";

    const params = new URLSearchParams(window.location.search);
    const observe = params.get('observe') || '';
    const gratitude = params.get('gratitude') || '';

    if (!observe && !gratitude) {
      document.getElementById('icon').innerText = '⚠️';
      document.getElementById('status').innerText = 'No data received';
    } else {
      const entry = {
        id: Date.now(),
        t: Date.now(),
        urge: true,
        gratitude: gratitude.length > 0,
        text: `⌚ Watch: Observed: ${observe} | Gratitude: ${gratitude}`,
        tags: ['urge', 'watch', 'chain']
      };

      db.collection('users').doc(USER_ID).get().then(doc => {
        let entries = [];
        if (doc.exists && doc.data().entries) {
          entries = doc.data().entries;
        }
        entries.unshift(entry);
        return db.collection('users').doc(USER_ID).set({ entries: entries }, { merge: true });
      }).then(() => {
        document.getElementById('icon').innerText = '✅';
        document.getElementById('status').innerText = 'Saved!';
        document.getElementById('msg').innerText = 'Logged to Mindspace';
        setTimeout(() => {
          window.location.href = '/Mindspace/';
        }, 1500);
      }).catch(err => {
        document.getElementById('icon').innerText = '❌';
        document.getElementById('status').innerText = 'Error';
        document.getElementById('msg').innerText = err.message;
      });
    }
  </script>
</body>
</html>
